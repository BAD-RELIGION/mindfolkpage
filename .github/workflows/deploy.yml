name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

# Allow the workflow to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Create js/config.js from the GitHub Secret.
      # The file is git-ignored so the real key never enters the repo.
      - name: Inject Helius API key
        run: |
          cat > js/config.js <<EOF
          window.CONFIG = {
            HELIUS_API_KEY: '${{ secrets.HELIUS_API_KEY }}'
          };
          EOF

      - name: Upload site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .   # deploy the whole repo root

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
